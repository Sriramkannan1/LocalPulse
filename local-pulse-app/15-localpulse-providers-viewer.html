<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Providers - LocalPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body class="bg-[#F8FAFC]">
  <div class="w-full h-screen flex flex-col overflow-hidden">
    
    <header class="shrink-0 pt-14 px-6 pb-4 bg-white shadow-sm z-10">
      <div class="flex items-center gap-4 mb-4">
        <a href="04-localpulse-feed-screen.html" class="w-11 h-11 flex items-center justify-center rounded-full active:bg-slate-100">
          <iconify-icon icon="lucide:arrow-left" class="text-2xl text-slate-900"></iconify-icon>
        </a>
        <h1 class="text-[20px] font-bold text-slate-900">Providers</h1>
      </div>

      <div class="relative flex items-center mb-4">
        <iconify-icon icon="lucide:search" class="absolute left-4 text-slate-400 text-lg"></iconify-icon>
        <input type="text" id="search-input" placeholder="Search providers..." class="w-full h-12 pl-11 pr-4 bg-[#F8FAFC] border border-slate-100 rounded-2xl text-sm font-medium focus:outline-none focus:border-[#16A34A] transition-colors">
      </div>

      <div class="flex overflow-x-auto no-scrollbar gap-2 pb-1" id="filter-chips">
        <button class="filter-btn shrink-0 px-4 py-1.5 rounded-full text-xs font-semibold bg-[#16A34A] text-white border border-[#16A34A]" data-category="All">All</button>
        <button class="filter-btn shrink-0 px-4 py-1.5 rounded-full text-xs font-semibold bg-white text-slate-500 border border-slate-200" data-category="Electrician">Electrician</button>
        <button class="filter-btn shrink-0 px-4 py-1.5 rounded-full text-xs font-semibold bg-white text-slate-500 border border-slate-200" data-category="Plumber">Plumber</button>
        <button class="filter-btn shrink-0 px-4 py-1.5 rounded-full text-xs font-semibold bg-white text-slate-500 border border-slate-200" data-category="Cleaning">Cleaning</button>
        <button class="filter-btn shrink-0 px-4 py-1.5 rounded-full text-xs font-semibold bg-white text-slate-500 border border-slate-200" data-category="Mechanic">Mechanic</button>
      </div>
    </header>

    <main id="providers-list" class="flex-1 overflow-y-auto px-6 py-4 space-y-4 pb-10">
      <!-- Dynamic cards go here -->
    </main>
  </div>
  <script src="js/core/storage.js"></script>
  <script src="js/data/mockdb.js"></script>
  <script src="js/core/router.js"></script>
  <script src="js/user/providers.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Router.guardUserRoute();
      // Ensure mockdb is loaded so our 40 providers are ready
      if(window.MockDB) window.MockDB.initialize();
    });
  </script>
</body>
</html>
