<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalPulse Splash Screen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      margin: 0;
      padding: 0;
    }

    @keyframes spin-slow {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .spinner {
      animation: spin-slow 1s linear infinite;
      border-top-color: transparent;
    }

    .gradient-bg {
      background: linear-gradient(180deg, #FFFFFF 0%, #F8FAFC 70%, #E6F4EA 100%);
    }
  </style>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/mobile.css">
  <link rel="stylesheet" href="css/admin.css">
</head>

<body>
  <div class="w-full h-screen flex flex-col items-center justify-between gradient-bg">
    <main class="flex-1 w-full flex flex-col items-center justify-center px-8">
      <div class="flex flex-col items-center animate-in fade-in duration-1000 slide-in-from-bottom-4">
        <div class="relative w-[160px] h-[160px] mb-8 flex items-center justify-center">
          <div class="absolute inset-0 bg-green-600/5 rounded-full blur-2xl"></div>
          <div class="relative flex flex-col items-center justify-center">
            <div class="text-green-600 mb-2"><svg width="100" height="120" viewBox="0 0 100 120" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M50 0C22.3858 0 0 22.3858 0 50C0 75 19 92 50 120C81 92 100 75 100 50C100 22.3858 77.6142 0 50 0Z"
                  fill="#16A34A" />
                <rect x="25" y="60" width="12" height="20" fill="#FFFFFF" fill-opacity="0.4" />
                <rect x="40" y="45" width="15" height="35" fill="#FFFFFF" fill-opacity="0.6" />
                <rect x="58" y="55" width="14" height="25" fill="#FFFFFF" fill-opacity="0.4" />
                <path d="M25 60L40 45V80H25V60Z" fill="#FFFFFF" fill-opacity="0.2" />
                <path d="M55 45L72 55V80H55V45Z" fill="#FFFFFF" fill-opacity="0.2" />
              </svg></div>
          </div>
        </div>
        <h1 class="text-4xl font-extrabold text-green-900 tracking-tight mb-2">LocalPulse</h1>
        <p class="text-slate-500 font-medium text-center text-lg">Stronger Communities,<br />Better Living</p>
      </div>
    </main>
    <footer class="shrink-0 pb-[64px] flex flex-col items-center">
      <div class="w-8 h-8 rounded-full border-4 border-slate-200 border-t-green-600 spinner"></div><span
        class="mt-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Loading Pulse</span>
    </footer>
  </div>
  <script src="js/core/storage.js"></script>
  <script src="js/data/mockdb.js"></script>
  <script src="js/core/router.js"></script>
  <script src="js/core/app.js"></script>
  <script src="js/auth/auth.js"></script>
</body>

</html>
