<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #F8FAFC;
    }
    .shadow-card {
      box-shadow: 0 2px 12px -2px rgba(0, 0, 0, 0.06), 0 4px 6px -2px rgba(0, 0, 0, 0.03);
    }
  </style>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/mobile.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="w-full h-screen flex flex-col bg-[#F8FAFC]">
    <!-- Header -->
    <header class="shrink-0 pt-14 px-5 pb-4 flex items-center justify-between bg-white border-b border-slate-100">
      <div class="flex items-center gap-4">
        <a href="08-localpulse-admin-dashboard.html" id="back-btn" class="w-10 h-10 flex items-center justify-center -ml-2">
          <iconify-icon icon="lucide:arrow-left" class="text-2xl text-[#16A34A]"></iconify-icon>
        </a>
        <h1 class="text-xl font-bold text-[#16A34A]">Admin - Events</h1>
      </div>
      <a href="18-localpulse-admin-create-event.html" id="add-event-btn" class="w-11 h-11 bg-[#16A34A] rounded-full flex items-center justify-center shadow-lg shadow-green-200 active:scale-95 transition-transform">
        <iconify-icon icon="lucide:plus" class="text-white text-2xl"></iconify-icon>
      </a>
    </header>

    <!-- Main Content -->
    <main id="events-list" class="flex-1 overflow-y-auto px-5 py-6 space-y-5">
      <!-- Dynamically populated by js/admin/events.js -->
    </main>

    <!-- Bottom Navigation -->
    <footer class="shrink-0 pb-[34px] bg-white border-t border-slate-100">
      <div class="flex justify-around items-center h-14">
        <a href="08-localpulse-admin-dashboard.html" id="nav-home" class="flex flex-col items-center justify-center w-full text-slate-400">
          <iconify-icon icon="lucide:home" class="text-2xl"></iconify-icon>
          <span class="text-[10px] font-medium mt-1">Home</span>
        </a>
        <a href="10-localpulse-admin-issues-management.html" id="nav-issues" class="flex flex-col items-center justify-center w-full text-slate-400">
          <iconify-icon icon="lucide:clipboard-list" class="text-2xl"></iconify-icon>
          <span class="text-[10px] font-medium mt-1">Manage Issues</span>
        </a>
        <a href="09-localpulse-admin-events-screen.html" id="nav-events" class="flex flex-col items-center justify-center w-full text-[#16A34A]">
          <iconify-icon icon="lucide:calendar" class="text-2xl"></iconify-icon>
          <span class="text-[10px] font-semibold mt-1">Events</span>
        </a>
        <a href="11-localpulse-admin-providers-management.html" id="nav-providers" class="flex flex-col items-center justify-center w-full text-slate-400">
          <iconify-icon icon="lucide:users" class="text-2xl"></iconify-icon>
          <span class="text-[10px] font-medium mt-1">Providers</span>
        </a>
        <a href="#" onclick="Storage.logout(); window.location.href='03-localpulse-mobile-login-screen.html';" id="nav-logout" class="flex flex-col items-center justify-center w-full text-slate-400">
          <iconify-icon icon="lucide:log-out" class="text-2xl"></iconify-icon>
          <span class="text-[10px] font-medium mt-1">Logout</span>
        </a>
      </div>
    </footer>
  </div>
  <script src="js/core/storage.js"></script>
  <script src="js/data/mockdb.js"></script>
  <script src="js/core/router.js"></script>
  <script src="js/core/app.js"></script>
  <script src="js/admin/events.js"></script>
</body>
</html>
