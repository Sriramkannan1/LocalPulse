<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provider Dashboard - LocalPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .card-shadow { box-shadow: 0 4px 12px 0 rgba(0, 0, 0, 0.05); }
  </style>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body class="bg-[#F8FAFC]">
  <div class="w-full h-screen flex flex-col overflow-hidden">
    
    <!-- Top App Bar -->
    <header class="shrink-0 pt-14 bg-white border-b border-slate-100 px-4 pb-4">
      <div class="flex items-center justify-between">
        <h1 class="text-[#16A34A] font-bold text-lg tracking-tight">LocalPulse Provider</h1>
        <button class="w-10 h-10 flex items-center justify-center rounded-full active:bg-slate-100 transition-colors" onclick="Storage.logout(); window.location.href='03-localpulse-mobile-login-screen.html';">
          <iconify-icon icon="lucide:log-out" class="text-xl text-slate-700"></iconify-icon>
        </button>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto px-4 py-6 space-y-6 pb-6">
      
      <!-- Greeting -->
      <div>
        <h2 class="text-2xl font-bold text-slate-900">Welcome, Provider 👋</h2>
        <p class="text-sm font-medium text-slate-500">Here is your daily workflow overview.</p>
      </div>

      <!-- Summary Dashboard -->
      <div>
        <div class="grid grid-cols-2 gap-3 mb-3">
          <div class="bg-white p-4 rounded-2xl border border-slate-100 card-shadow flex flex-col items-center text-center">
            <span class="text-xs font-semibold text-slate-500 mb-1">Assigned</span>
            <span class="text-3xl font-black text-slate-900" id="metric-assigned">0</span>
          </div>
          <div class="bg-white p-4 rounded-2xl border border-slate-100 card-shadow flex flex-col items-center text-center">
            <span class="text-xs font-semibold text-blue-600 mb-1">Accepted</span>
            <span class="text-3xl font-black text-blue-700" id="metric-accepted">0</span>
          </div>
        </div>
        <div class="grid grid-cols-3 gap-3">
          <div class="bg-white p-3 rounded-2xl border border-slate-100 card-shadow flex flex-col items-center text-center">
            <span class="text-[10px] font-semibold text-amber-600 mb-1 uppercase">In Progress</span>
            <span class="text-xl font-black text-amber-700" id="metric-inprogress">0</span>
          </div>
          <div class="bg-white p-3 rounded-2xl border border-slate-100 card-shadow flex flex-col items-center text-center">
            <span class="text-[10px] font-semibold text-emerald-600 mb-1 uppercase">Completed</span>
            <span class="text-xl font-black text-emerald-700" id="metric-completed">0</span>
          </div>
          <div class="bg-white p-3 rounded-2xl border border-slate-100 card-shadow flex flex-col items-center text-center">
            <span class="text-[10px] font-semibold text-red-600 mb-1 uppercase">Rejected</span>
            <span class="text-xl font-black text-red-700" id="metric-rejected">0</span>
          </div>
        </div>
      </div>

      <!-- Filter Tabs -->
      <div class="flex overflow-x-auto no-scrollbar gap-2 pb-1" id="task-filter-chips">
        <button class="filter-btn shrink-0 px-4 py-1.5 rounded-full text-xs font-semibold bg-slate-800 text-white border border-slate-800 transition-colors" data-filter="All">All Tasks</button>
        <button class="filter-btn shrink-0 px-4 py-1.5 rounded-full text-xs font-semibold bg-white text-slate-500 border border-slate-200 transition-colors" data-filter="Pending">Pending Action</button>
        <button class="filter-btn shrink-0 px-4 py-1.5 rounded-full text-xs font-semibold bg-white text-slate-500 border border-slate-200 transition-colors" data-filter="Active">Active Work</button>
      </div>

      <!-- Tasks List -->
      <div id="tasks-list" class="space-y-4">
        <!-- JS rendered cards -->
      </div>
    </main>
  </div>

  <!-- Reject Reason Modal -->
  <div id="reject-modal" class="fixed inset-0 z-[100] hidden items-end justify-center bg-slate-900/40 backdrop-blur-sm p-0 sm:p-4">
    <div class="bg-white w-full max-w-sm rounded-t-3xl sm:rounded-3xl shadow-xl overflow-hidden animate-in slide-in-from-bottom-full duration-300">
      <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
        <h3 class="font-bold text-slate-800 text-lg">Select Reason</h3>
        <button type="button" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-200 text-slate-600 active:scale-90 transition-transform close-reject">
          <iconify-icon icon="lucide:x"></iconify-icon>
        </button>
      </div>
      <div class="p-4 space-y-2 max-h-[60vh] overflow-y-auto">
        <button type="button" class="reason-btn w-full text-left p-3 rounded-xl flex items-center gap-3 active:bg-slate-100" data-reason="Too Far">
          <iconify-icon icon="lucide:map" class="text-slate-400 text-xl"></iconify-icon>
          <span class="font-semibold text-slate-800">Too Far</span>
        </button>
        <button type="button" class="reason-btn w-full text-left p-3 rounded-xl flex items-center gap-3 active:bg-slate-100" data-reason="Area Not Covered">
          <iconify-icon icon="lucide:map-pin" class="text-slate-400 text-xl"></iconify-icon>
          <span class="font-semibold text-slate-800">Area Not Covered</span>
        </button>
        <button type="button" class="reason-btn w-full text-left p-3 rounded-xl flex items-center gap-3 active:bg-slate-100" data-reason="Unavailable">
          <iconify-icon icon="lucide:clock" class="text-slate-400 text-xl"></iconify-icon>
          <span class="font-semibold text-slate-800">Unavailable</span>
        </button>
        <button type="button" class="reason-btn w-full text-left p-3 rounded-xl flex items-center gap-3 active:bg-slate-100" data-reason="Heavy Workload">
          <iconify-icon icon="lucide:briefcase" class="text-slate-400 text-xl"></iconify-icon>
          <span class="font-semibold text-slate-800">Heavy Workload</span>
        </button>
        <button type="button" class="reason-btn w-full text-left p-3 rounded-xl flex items-center gap-3 active:bg-slate-100" data-reason="Wrong Category">
          <iconify-icon icon="lucide:alert-circle" class="text-slate-400 text-xl"></iconify-icon>
          <span class="font-semibold text-slate-800">Wrong Category</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Toast Notification Container -->
  <div id="toast-container"></div>

  <script src="js/core/storage.js"></script>
  <script src="js/core/router.js"></script>
  <script src="js/provider/dashboard.js"></script>
</body>
</html>
