<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalPulse - Create Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #F8FAFC;
    }
    .input-shadow {
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }
    input:focus {
      outline: 2px solid #16A34A;
      outline-offset: -2px;
    }
  </style>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/mobile.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="m-0 p-0 text-slate-900">
  <div class="w-full h-screen flex flex-col bg-[#F8FAFC]">
    <!-- Header with Safe Area Spacing -->
    <header class="shrink-0 pt-14 px-5 pb-4 flex items-center">
      <a href="03-localpulse-mobile-login-screen.html" class="w-11 h-11 flex items-center justify-start text-slate-800" id="nav-back-button">
        <iconify-icon icon="lucide:chevron-left" class="text-2xl"></iconify-icon>
      </a>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto px-6">
      <!-- Title Section -->
      <div class="mb-8">
        <h1 class="text-2xl font-bold text-slate-900">Create Account</h1>
        <p class="text-slate-500 mt-1">Join your local community</p>
      </div>

      <!-- Form Section -->
      <form class="space-y-4" id="register-form">
        <!-- Full Name -->
        <div class="space-y-2">
          <label class="text-sm font-medium text-slate-700 ml-1">Full Name</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
              <iconify-icon icon="lucide:user" class="text-xl"></iconify-icon>
            </div>
            <input type="text" placeholder="John Doe" class="w-full h-14 pl-11 pr-4 bg-white border border-slate-200 rounded-2xl text-[15px] input-shadow transition-all">
          </div>
        </div>

        <!-- Email -->
        <div class="space-y-2">
          <label class="text-sm font-medium text-slate-700 ml-1">Email</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
              <iconify-icon icon="lucide:mail" class="text-xl"></iconify-icon>
            </div>
            <input type="email" placeholder="john.doe@example.com" class="w-full h-14 pl-11 pr-4 bg-white border border-slate-200 rounded-2xl text-[15px] input-shadow transition-all">
          </div>
        </div>

        <!-- Password -->
        <div class="space-y-2">
          <label class="text-sm font-medium text-slate-700 ml-1">Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
              <iconify-icon icon="lucide:lock-keyhole" class="text-xl"></iconify-icon>
            </div>
            <input type="password" placeholder="••••••••••••" class="w-full h-14 pl-11 pr-12 bg-white border border-slate-200 rounded-2xl text-[15px] input-shadow transition-all">
            <div class="absolute inset-y-0 right-0 pr-4 flex items-center">
              <button type="button" class="text-slate-400">
                <iconify-icon icon="lucide:eye-off" class="text-xl"></iconify-icon>
              </button>
            </div>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="space-y-2">
          <label class="text-sm font-medium text-slate-700 ml-1">Confirm Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
              <iconify-icon icon="lucide:lock-keyhole" class="text-xl"></iconify-icon>
            </div>
            <input type="password" placeholder="••••••••••••" class="w-full h-14 pl-11 pr-12 bg-white border border-slate-200 rounded-2xl text-[15px] input-shadow transition-all">
            <div class="absolute inset-y-0 right-0 pr-4 flex items-center">
              <button type="button" class="text-slate-400">
                <iconify-icon icon="lucide:eye-off" class="text-xl"></iconify-icon>
              </button>
            </div>
          </div>
        </div>

        <!-- Terms & Privacy -->
        <div class="flex items-start space-x-3 pt-2">
          <div class="flex items-center h-5 mt-0.5">
            <input type="checkbox" id="terms" class="w-5 h-5 rounded border-slate-300 text-[#16A34A] focus:ring-[#16A34A]">
          </div>
          <label for="terms" class="text-sm leading-tight text-slate-600 font-medium">
            I agree to the <a href="18-localpulse-terms-and-conditions.html" class="text-[#16A34A]">Terms & Conditions</a> and <a href="19-localpulse-privacy-policy.html" class="text-[#16A34A]">Privacy Policy</a>
          </label>
        </div>
      </form>
    </main>

    <!-- Footer with Safe Area Spacing -->
    <footer class="shrink-0 px-6 pb-[34px] pt-4">
      <button type="submit" form="register-form" class="w-full h-14 bg-[#16A34A] text-white font-bold rounded-2xl shadow-lg active:scale-[0.98] transition-all" id="cta-register-button">
        Sign Up
      </button>
      <div class="mt-6 text-center">
        <p class="text-sm font-medium text-slate-600">
          Already have an account? <a href="03-localpulse-mobile-login-screen.html" class="text-[#16A34A]" id="nav-login-link">Login</a>
        </p>
      </div>
    </footer>
  </div>
  <script src="js/core/storage.js"></script>
  <script src="js/data/mockdb.js"></script>
  <script src="js/core/router.js"></script>
  <script src="js/core/app.js"></script>
  <script src="js/auth/auth.js"></script>
</body>
</html>
