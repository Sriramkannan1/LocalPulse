<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Providers Dashboard V2 - LocalPulse Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .card-shadow { box-shadow: 0 4px 12px 0 rgba(0, 0, 0, 0.05); }
    .progress-bar-fill { transition: width 0.5s ease-out; }
  </style>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="bg-[#F8FAFC]">
  <div class="w-full h-screen flex flex-col overflow-hidden">
    
    <!-- Top App Bar -->
    <header class="shrink-0 pt-14 bg-white border-b border-slate-100 px-4 pb-4 sticky top-0 z-20">
      <div class="flex items-center justify-between">
        <a href="08-localpulse-admin-dashboard.html" class="w-11 h-11 flex items-center justify-start text-slate-800">
          <iconify-icon icon="lucide:arrow-left" class="text-2xl"></iconify-icon>
        </a>
        <h1 class="text-[#1F2937] font-bold text-lg tracking-tight">Network Dashboard</h1>
        <div class="w-11 h-11"></div> <!-- Spacer -->
      </div>
    </header>

    <main class="flex-1 overflow-y-auto px-4 py-6 space-y-8 pb-[100px]">
      
      <!-- Section 10: Network Score Hero -->
      <section id="network-score-section">
        <div class="bg-white rounded-3xl p-6 shadow-xl relative overflow-hidden" id="network-score-card">
          <!-- Dynamic Score Content injected here -->
        </div>
      </section>

      <!-- Section 5: Coverage Gap Alerts -->
      <section id="alerts-section">
        <!-- Alerts injected here -->
      </section>

      <!-- Section 6: Quick Actions -->
      <section>
        <div class="grid grid-cols-2 gap-3">
          <a href="16-localpulse-provider-management-advanced.html" class="bg-white p-4 rounded-2xl border border-slate-100 flex flex-col items-center justify-center text-center card-shadow active:bg-slate-50 transition-colors">
            <div class="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-2">
              <iconify-icon icon="lucide:user-plus" class="text-xl"></iconify-icon>
            </div>
            <span class="text-xs font-bold text-slate-800">Add Provider</span>
          </a>
          <a href="#location-coverage-section" class="bg-white p-4 rounded-2xl border border-slate-100 flex flex-col items-center justify-center text-center card-shadow active:bg-slate-50 transition-colors">
            <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-2">
              <iconify-icon icon="lucide:map" class="text-xl"></iconify-icon>
            </div>
            <span class="text-xs font-bold text-slate-800">Manage Coverage</span>
          </a>
          <a href="10-localpulse-admin-issues-management.html" class="bg-white p-4 rounded-2xl border border-slate-100 flex flex-col items-center justify-center text-center card-shadow active:bg-slate-50 transition-colors">
            <div class="w-10 h-10 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center mb-2">
              <iconify-icon icon="lucide:list-todo" class="text-xl"></iconify-icon>
            </div>
            <span class="text-xs font-bold text-slate-800">Assignment Queue</span>
          </a>
          <button onclick="alert('Performance Analytics Modal logic here')" class="bg-white p-4 rounded-2xl border border-slate-100 flex flex-col items-center justify-center text-center card-shadow active:bg-slate-50 transition-colors">
            <div class="w-10 h-10 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mb-2">
              <iconify-icon icon="lucide:bar-chart-2" class="text-xl"></iconify-icon>
            </div>
            <span class="text-xs font-bold text-slate-800">Performance Analytics</span>
          </button>
        </div>
      </section>

      <!-- Section 1 & 4: Network Health & Status Breakdown -->
      <section>
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-sm font-black text-slate-800 uppercase tracking-wider">Network Health</h2>
        </div>
        
        <!-- Status Breakdown Badges -->
        <div class="flex flex-wrap gap-2 mb-4" id="status-badges">
          <!-- Badges injected here -->
        </div>

        <div class="grid grid-cols-3 gap-2" id="health-grid">
          <!-- 2x3 Grid injected here -->
        </div>
      </section>

      <!-- Section 9: Provider Approval Workflow -->
      <section id="approval-section" class="hidden">
        <h2 class="text-sm font-black text-slate-800 uppercase tracking-wider mb-4">Pending Approvals</h2>
        <div id="pending-list" class="space-y-3">
          <!-- Pending providers injected here -->
        </div>
      </section>

      <!-- Section: Location Coverage Health -->
      <section id="location-coverage-section">
        <h2 class="text-sm font-black text-slate-800 uppercase tracking-wider mb-4">Location Coverage</h2>
        <div class="bg-white rounded-2xl border border-slate-100 p-1 card-shadow" id="location-coverage-list">
          <!-- Location items injected here -->
        </div>
      </section>

      <!-- Section: Category Coverage -->
      <section>
        <h2 class="text-sm font-black text-slate-800 uppercase tracking-wider mb-4">Category Breakdown</h2>
        <div class="grid grid-cols-2 gap-3" id="category-coverage-list">
          <!-- Category counts injected here -->
        </div>
      </section>

      <!-- Section: Assignment Load Distribution -->
      <section>
        <h2 class="text-sm font-black text-slate-800 uppercase tracking-wider mb-4">Top 5 Busy Providers</h2>
        <div class="space-y-4" id="busy-providers-list">
          <!-- Progress bars injected here -->
        </div>
      </section>

      <!-- Section: Provider Utilization -->
      <section>
        <h2 class="text-sm font-black text-slate-800 uppercase tracking-wider mb-4">Utilization Rates</h2>
        <div class="space-y-3" id="utilization-list">
          <!-- Utilization items injected here -->
        </div>
      </section>

      <!-- Section: Service Response Metrics -->
      <section>
        <h2 class="text-sm font-black text-slate-800 uppercase tracking-wider mb-4">Service Metrics</h2>
        <div class="grid grid-cols-2 gap-3" id="service-metrics-grid">
          <!-- KPI cards injected here -->
        </div>
      </section>

      <!-- Section 8: Provider Search -->
      <section>
        <h2 class="text-sm font-black text-slate-800 uppercase tracking-wider mb-4">Provider Directory</h2>
        <div class="relative mb-4">
          <iconify-icon icon="lucide:search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></iconify-icon>
          <input type="text" id="provider-search-input" placeholder="Search by name, role, location..." class="w-full h-12 pl-11 pr-4 bg-white border border-slate-200 rounded-2xl text-sm font-medium focus:outline-none focus:border-[#16A34A] transition-colors card-shadow">
        </div>
        
        <!-- Section 7 & Directory Preview: Recently Added / Directory Preview -->
        <div id="directory-list" class="space-y-3">
          <!-- Provider cards injected here -->
        </div>
      </section>
      
    </main>

    <!-- Bottom Navigation -->
    <footer class="absolute bottom-0 left-0 right-0 shrink-0 bg-white border-t border-slate-100 pb-[34px] pt-2 z-50">
      <div class="flex justify-around items-center h-14">
        <a href="08-localpulse-admin-dashboard.html" class="flex flex-col items-center justify-center w-full text-slate-400">
          <iconify-icon icon="lucide:home" class="text-2xl"></iconify-icon>
          <span class="text-[10px] font-medium mt-1">Home</span>
        </a>
        <a href="10-localpulse-admin-issues-management.html" class="flex flex-col items-center justify-center w-full text-slate-400">
          <iconify-icon icon="lucide:clipboard-list" class="text-2xl"></iconify-icon>
          <span class="text-[10px] font-medium mt-1">Manage Issues</span>
        </a>
        <a href="11-localpulse-admin-providers-management.html" class="flex flex-col items-center justify-center w-full text-[#16A34A]">
          <iconify-icon icon="lucide:users" class="text-2xl"></iconify-icon>
          <span class="text-[10px] font-semibold mt-1">Providers</span>
        </a>
      </div>
    </footer>
  </div>

  <script src="js/core/storage.js"></script>
  <script src="js/core/router.js"></script>
  <script src="js/admin/providers-v2.js"></script>
</body>
</html>
