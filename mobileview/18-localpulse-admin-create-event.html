<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #F8FAFC;
    }
  </style>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/mobile.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="w-full h-screen flex flex-col bg-[#F8FAFC]">
    <!-- Header -->
    <header class="shrink-0 pt-14 px-5 pb-4 flex items-center justify-between bg-white border-b border-slate-100">
      <div class="flex items-center gap-4">
        <a href="09-localpulse-admin-events-screen.html" class="w-10 h-10 flex items-center justify-center -ml-2">
          <iconify-icon icon="lucide:arrow-left" class="text-2xl text-[#16A34A]"></iconify-icon>
        </a>
        <h1 class="text-xl font-bold text-[#16A34A]">Create Event</h1>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto px-5 py-6 space-y-6">
      
      <!-- Create Form -->
      <form id="create-event-form" class="space-y-5">
        
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
          <h2 class="text-sm font-bold text-slate-800 uppercase tracking-wider mb-4">Event Details</h2>
          
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-bold text-slate-500 mb-1">Event Title</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <iconify-icon icon="lucide:type" class="text-slate-400"></iconify-icon>
                </div>
                <input type="text" id="event-title" required class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-2 focus:ring-[#16A34A] focus:border-transparent bg-slate-50" placeholder="e.g. Community Cleanup">
              </div>
            </div>

            <div>
              <label class="block text-xs font-bold text-slate-500 mb-1">Description</label>
              <textarea id="event-desc" rows="3" required class="block w-full p-3 border border-slate-200 rounded-xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-2 focus:ring-[#16A34A] focus:border-transparent bg-slate-50" placeholder="Describe the event..."></textarea>
            </div>
          </div>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
          <h2 class="text-sm font-bold text-slate-800 uppercase tracking-wider mb-4">Date & Location</h2>
          
          <div class="space-y-4">
            <div class="flex gap-4">
              <div class="flex-1">
                <label class="block text-xs font-bold text-slate-500 mb-1">Date</label>
                <div class="relative">
                  <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <iconify-icon icon="lucide:calendar" class="text-slate-400"></iconify-icon>
                  </div>
                  <input type="date" id="event-date" required class="block w-full pl-10 pr-2 py-3 border border-slate-200 rounded-xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-2 focus:ring-[#16A34A] focus:border-transparent bg-slate-50">
                </div>
              </div>
              <div class="flex-1">
                <label class="block text-xs font-bold text-slate-500 mb-1">Time</label>
                <div class="relative">
                  <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <iconify-icon icon="lucide:clock" class="text-slate-400"></iconify-icon>
                  </div>
                  <input type="time" id="event-time" required class="block w-full pl-10 pr-2 py-3 border border-slate-200 rounded-xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-2 focus:ring-[#16A34A] focus:border-transparent bg-slate-50">
                </div>
              </div>
            </div>

            <div>
              <label class="block text-xs font-bold text-slate-500 mb-1">Location</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <iconify-icon icon="lucide:map-pin" class="text-slate-400"></iconify-icon>
                </div>
                <input type="text" id="event-location" required class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl text-sm font-semibold text-slate-900 focus:outline-none focus:ring-2 focus:ring-[#16A34A] focus:border-transparent bg-slate-50" placeholder="e.g. VOC Park, Coimbatore">
              </div>
            </div>
          </div>
        </div>

        <button type="submit" class="w-full bg-[#16A34A] text-white font-bold py-4 rounded-xl shadow-lg shadow-green-200 active:scale-[0.98] transition-transform">
          Create Event
        </button>

      </form>

    </main>
  </div>
  <script src="js/core/storage.js"></script>
  <script src="js/data/mockdb.js"></script>
  <script src="js/core/router.js"></script>
  <script src="js/core/app.js"></script>
  <script src="js/admin/create-event.js"></script>
</body>
</html>
